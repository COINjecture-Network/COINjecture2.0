version: '3.8'

# COINjecture — Production Docker Compose
#
# Differences from docker-compose.yml (testnet):
#   • No debug ports exposed to host (metrics/RPC bind to localhost only)
#   • Higher resource limits suitable for a production node
#   • always restart policy
#   • json-file logging with rotation
#   • Mining disabled by default (validator role)
#   • RUST_BACKTRACE disabled
#   • Internal-only network for P2P; separate network for RPC exposure
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#
# Prerequisites:
#   • .env file with production values (see .env.example)
#   • TLS termination handled by a reverse proxy (Caddy, nginx, Traefik) in
#     front of the RPC port — do NOT expose 9933 directly to the internet.

services:
  # ── Bootstrap / Validator Node ────────────────────────────────────────────
  node:
    build:
      context: .
      dockerfile: Dockerfile
    image: coinject-node:production
    container_name: coinject-production
    restart: always
    env_file:
      - .env
    environment:
      - RUST_LOG=${RUST_LOG:-warn}
      - RUST_BACKTRACE=0
    # No host port mappings for P2P or metrics in production.
    # RPC is bound to 127.0.0.1 — expose via reverse proxy only.
    ports:
      - "707:707"              # CPP P2P — must be reachable by peers
      - "127.0.0.1:9933:9933" # JSON-RPC — localhost only; proxy handles TLS
      - "127.0.0.1:9090:9090" # Metrics — localhost only; scrape via Prometheus
    volumes:
      - node-data:/data
    command: >
      --data-dir /data
      --cpp-p2p-addr 0.0.0.0:707
      --metrics-addr 0.0.0.0:9090
      --rpc-addr 0.0.0.0:9933
      --bootnodes ${BOOTNODES}
      --difficulty ${DIFFICULTY:-8}
    networks:
      - coinject-internal
      - coinject-rpc
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  node-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      # Override DATA_DIR in .env to point at a persistent host path, e.g.:
      # DATA_DIR=/mnt/chain-data
      device: ${DATA_DIR:-/var/lib/coinject}

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  coinject-internal:
    driver: bridge
    internal: true   # P2P only — no external routing
  coinject-rpc:
    driver: bridge   # RPC port mapped to 127.0.0.1 above; proxy lives here

version: 2

updates:
  # ── Rust / Cargo dependencies ──────────────────────────────────────────────
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
      include: scope
    # Group all patch updates to reduce noise
    groups:
      patch-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Pin major versions manually — breaking changes require review
      - dependency-name: tokio
        update-types: ["version-update:semver-major"]
      - dependency-name: serde
        update-types: ["version-update:semver-major"]
      - dependency-name: jsonrpsee
        update-types: ["version-update:semver-major"]
      - dependency-name: redb
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope
    groups:
      actions-updates:
        patterns: ["*"]

  # ── Docker base images ─────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"
      include: scope

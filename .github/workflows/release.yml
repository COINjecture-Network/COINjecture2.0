name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Build release binaries for all platforms ──────────────────────────────
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-amd64
            binary_ext: ""

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-arm64
            binary_ext: ""
            use_cross: true

          # macOS x86_64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-amd64
            binary_ext: ""

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            binary_ext: ""

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-amd64
            binary_ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-registry-

      - name: Install cross (ARM64 Linux)
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build binaries (native)
        if: '!matrix.use_cross'
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --bin coinject-node \
            --bin coinject-wallet

      - name: Build binaries (cross)
        if: matrix.use_cross
        run: |
          cross build --release \
            --target ${{ matrix.target }} \
            --bin coinject-node \
            --bin coinject-wallet

      # ── Package artifacts ──────────────────────────────────────────────────
      - name: Package Linux/macOS
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p dist

          cp target/${{ matrix.target }}/release/coinject-node \
             dist/coinject-node-${TAG}-${{ matrix.artifact_suffix }}
          cp target/${{ matrix.target }}/release/coinject-wallet \
             dist/coinject-wallet-${TAG}-${{ matrix.artifact_suffix }}

          # Checksums
          cd dist
          sha256sum coinject-node-${TAG}-${{ matrix.artifact_suffix }} \
                    coinject-wallet-${TAG}-${{ matrix.artifact_suffix }} \
            > checksums-${{ matrix.artifact_suffix }}.txt

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Copy-Item "target\${{ matrix.target }}\release\coinject-node.exe" `
                    "dist\coinject-node-${TAG}-${{ matrix.artifact_suffix }}.exe"
          Copy-Item "target\${{ matrix.target }}\release\coinject-wallet.exe" `
                    "dist\coinject-wallet-${TAG}-${{ matrix.artifact_suffix }}.exe"

          # Checksums
          Set-Location dist
          Get-FileHash "coinject-node-${TAG}-${{ matrix.artifact_suffix }}.exe",
                       "coinject-wallet-${TAG}-${{ matrix.artifact_suffix }}.exe" `
            -Algorithm SHA256 | Format-Table Hash, Path |
            Out-File "checksums-${{ matrix.artifact_suffix }}.txt" -Encoding utf8

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: dist/
          retention-days: 1

  # ─── Create GitHub Release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create combined checksum file
        run: |
          cd dist
          cat checksums-*.txt > SHA256SUMS.txt
          echo "=== Combined SHA256SUMS ==="
          cat SHA256SUMS.txt

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # Try to extract section from CHANGELOG if it exists
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 > release_notes.md
          else
            echo "Release $TAG" > release_notes.md
            echo "" >> release_notes.md
            echo "See commit history for details." >> release_notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: COINjecture ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: dist/*

  # ─── Docker release image ───────────────────────────────────────────────────
  docker-release:
    name: Docker Release Image
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push release Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

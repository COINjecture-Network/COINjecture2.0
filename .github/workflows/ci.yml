name: CI

on:
  push:
    branches: [remove-libp2p, main]
  pull_request:
    branches: [remove-libp2p, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # TODO: Enable after running cargo fmt --all
      # - name: Check formatting
      #   run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all

      - name: Run tests
        run: cargo test --all

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start testnet
        run: docker compose up -d

      - name: Wait for startup
        run: sleep 90

      - name: Health checks
        run: |
          FAILED=0
          for port in 9090 9091 9092 9093; do
            STATUS=$(curl -sf http://localhost:$port/health || echo "FAIL")
            echo "Port $port: $STATUS"
            if echo "$STATUS" | grep -q "FAIL"; then
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "--- Docker logs ---"
            docker compose logs --tail=50
            exit 1
          fi

      - name: Check RPC responds
        run: |
          for port in 9933 9934 9935 9936; do
            curl -sf -X POST http://localhost:$port \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"chain_getInfo","params":[],"id":1}' \
              || echo "RPC port $port did not respond"
          done

      - name: Teardown
        if: always()
        run: docker compose down -v

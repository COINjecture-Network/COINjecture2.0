name: COINjecture Network B CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==========================================================================
  # Build & Unit Tests
  # ==========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Build release
      run: cargo build --release
    
    - name: Run unit tests
      run: cargo test --release
    
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: coinject-binary
        path: target/release/coinject
        retention-days: 1

  # ==========================================================================
  # Network Sync Integration Test (6-Node Regression Test)
  # ==========================================================================
  network-sync-test:
    name: 6-Node Sync Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download binary artifact
      uses: actions/download-artifact@v4
      with:
        name: coinject-binary
        path: target/release/
    
    - name: Make binary executable
      run: chmod +x target/release/coinject
    
    - name: Make test script executable
      run: chmod +x tests/integration/network_sync_test.sh
    
    - name: Run 6-Node Sync Regression Test
      run: |
        echo "Running 6-node network sync regression test..."
        echo "This tests:"
        echo "  1. Adaptive Consensus (BOOTSTRAP → SECURE mode)"
        echo "  2. Gossip Trap Fix (unique request_id)"
        echo "  3. Multi-node sync stability"
        echo ""
        ./tests/integration/network_sync_test.sh
      env:
        NODE_COUNT: 6
        TEST_DURATION: 180
        CHECK_INTERVAL: 15
        MAX_SPREAD: 3
        MIN_BLOCKS: 15
        DIFFICULTY: 3
        BLOCK_TIME: 30

  # ==========================================================================
  # Quick 3-Node Smoke Test (faster, for PRs)
  # ==========================================================================
  quick-sync-test:
    name: 3-Node Quick Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 8
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download binary artifact
      uses: actions/download-artifact@v4
      with:
        name: coinject-binary
        path: target/release/
    
    - name: Make binary executable
      run: chmod +x target/release/coinject
    
    - name: Make test script executable
      run: chmod +x tests/integration/network_sync_test.sh
    
    - name: Run 3-Node Quick Sync Test
      run: ./tests/integration/network_sync_test.sh
      env:
        NODE_COUNT: 3
        TEST_DURATION: 90
        CHECK_INTERVAL: 15
        MAX_SPREAD: 2
        MIN_BLOCKS: 8
        DIFFICULTY: 3
        BLOCK_TIME: 20

  # ==========================================================================
  # ADZDB Feature Test
  # ==========================================================================
  adzdb-test:
    name: ADZDB Integration
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build with ADZDB feature
      run: cargo build --release --features adzdb
    
    - name: Test ADZDB integration
      run: cargo test --release --features adzdb

  # ==========================================================================
  # Security Audit
  # ==========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit
      continue-on-error: true  # Don't fail build for advisories


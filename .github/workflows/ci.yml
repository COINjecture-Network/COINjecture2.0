name: CI

on:
  push:
    branches: [main, remove-libp2p]
  pull_request:
    branches: [main, remove-libp2p]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Stage 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── Stage 2a: Test (default features) ──────────────────────────────────────
  test:
    name: Test (default features)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-test-

      - name: Run tests (default features)
        run: cargo test --all

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Code coverage
        run: |
          cargo tarpaulin \
            --all \
            --timeout 120 \
            --out Xml \
            --output-dir coverage/
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

  # ─── Stage 2b: Test (all features) ───────────────────────────────────────────
  test-all-features:
    name: Test (all features)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-test-all-features-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-all-features-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-test-all-features-

      - name: Run tests (all features)
        run: cargo test --all --all-features

  # ─── Stage 3: Build ─────────────────────────────────────────────────────────
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binaries
        run: |
          cargo build --release --bin coinject-node
          cargo build --release --bin coinject-wallet

      - name: Upload node binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: coinject-node-linux-amd64
          path: target/release/coinject-node
          retention-days: 7

      - name: Upload wallet binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: coinject-wallet-linux-amd64
          path: target/release/coinject-wallet
          retention-days: 7

  # ─── Stage 4: Security Audit ────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-audit
        run: cargo audit

      - name: Run cargo-deny (licenses, bans, advisories)
        run: cargo deny check
        continue-on-error: true

  # ─── Stage 5: Docker Build ───────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, test-all-features, build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/remove-libp2p' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Stage 6: Docker Smoke Test ─────────────────────────────────────────────
  smoke-test:
    name: Docker Smoke Test (4-node testnet)
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:latest
          docker pull "$IMAGE"

      - name: Start 4-node testnet
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:latest
          docker network create coinject-testnet
          # Node 1 — bootstrap (seed node, no peers)
          docker run -d --name node1 \
            --network coinject-testnet \
            -p 8546:8545 \
            -e P2P_LISTEN=0.0.0.0:30333 \
            -e RPC_LISTEN=0.0.0.0:8545 \
            "$IMAGE"
          # Nodes 2-4 — connect to node1
          for i in 2 3 4; do
            docker run -d --name "node${i}" \
              --network coinject-testnet \
              -p "$((8546 + i - 1)):8545" \
              -e P2P_LISTEN=0.0.0.0:30333 \
              -e RPC_LISTEN=0.0.0.0:8545 \
              -e BOOTSTRAP_PEERS=node1:30333 \
              "$IMAGE"
          done

      - name: Wait for nodes to start
        run: sleep 30

      - name: Health check — all 4 nodes respond
        run: |
          for port in 8546 8547 8548 8549; do
            echo "Checking node on port $port ..."
            curl -sf --retry 5 --retry-delay 3 \
              -X POST "http://localhost:${port}" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"coinject_getInfo","params":[],"id":1}' \
              | grep -q '"result"' \
              || { echo "Node on port $port failed health check"; exit 1; }
          done
          echo "All 4 nodes healthy"

      - name: Cleanup testnet
        if: always()
        run: |
          docker stop node1 node2 node3 node4 2>/dev/null || true
          docker rm   node1 node2 node3 node4 2>/dev/null || true
          docker network rm coinject-testnet 2>/dev/null || true

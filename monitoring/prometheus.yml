global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'coinjecture-api'
    static_configs:
      - targets: ['api-server:3030']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'coinjecture-node'
    static_configs:
      - targets: ['node:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Nginx reverse proxy for api.coinjecture.com → coinjecture-api (127.0.0.1:3030)
#
# Fixes common 503s:
#   - Large JSON-RPC bodies (chain_submitBlock) → client_max_body_size
#   - Slow node forwards → proxy_read_timeout / proxy_send_timeout
#   - SSE streams → longer timeouts under /events/
#
# Install on the VPS:
#   sudo cp scripts/nginx-api-subdomain.example.conf /etc/nginx/sites-available/api.coinjecture.com
#   # Edit ssl_certificate paths if your cert lives elsewhere; or run certbot on this server_name first.
#   sudo ln -sf /etc/nginx/sites-available/api.coinjecture.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# If you already have a server { } for this domain, merge the location / and /events/ blocks
# plus client_max_body_size and the proxy_*_timeout lines into that file instead.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP — ACME + redirect (adjust if certbot manages this server block differently)
server {
    listen 80;
    listen [::]:80;
    server_name api.coinjecture.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.coinjecture.com;

    ssl_certificate     /etc/letsencrypt/live/api.coinjecture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.coinjecture.com/privkey.pem;

    # Large JSON-RPC (e.g. chain_submitBlock via POST /node-rpc)
    client_max_body_size 64m;

    # SSE — long-lived streams (must exceed API idle; nginx default 60s drops clients)
    location ^~ /events/ {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 75s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    # REST + /node-rpc + auth — allow slow node round-trips
    location / {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
